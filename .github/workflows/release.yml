name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install cmake
        uses: lukka/get-cmake@latest

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Run tests
        run: cargo test --target x86_64-pc-windows-msvc

      - name: Prepare release archive
        shell: pwsh
        run: |
          $out = "release-staging"
          New-Item -ItemType Directory -Path $out -Force | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\xmp_reader.dll" $out
          Copy-Item "xmp-sidecar.propdesc" $out
          Copy-Item "scripts\install.ps1" $out
          Copy-Item "scripts\uninstall.ps1" $out
          Copy-Item "README.md" $out
          Copy-Item "LICENSE" $out
          $tag = $env:GITHUB_REF_NAME
          Compress-Archive -Path "$out\*" -DestinationPath "xmp-reader-$tag-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: xmp-reader-*.zip
          generate_release_notes: true
